name: Backtest

on:
  workflow_dispatch:
    inputs:
      years:
        description: '検証期間 (年)'
        required: false
        default: '2'
      mode:
        description: 'breakout / vcp / master(=+決算足跡・疑似同業・売り裁量) / zone'
        required: false
        default: 'breakout'
      check:
        description: '実在トレード検査 SYM:YYYY-MM-DD,... (省略可)'
        required: false
        default: ''
      fund:
        description: 'on=シグナル日時点のEPS実績で減益を除外'
        required: false
        default: 'on'

permissions:
  contents: read

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance pandas numpy lxml requests

      - name: Run verifier test suite
        run: python test_screener.py

      - name: Run backtest
        run: >
          python backtest.py
          --years "${{ github.event.inputs.years || '2' }}"
          --mode "${{ github.event.inputs.mode || 'breakout' }}"
          --fund "${{ github.event.inputs.fund || 'on' }}"
          --check "${{ github.event.inputs.check || '' }}"

      - uses: actions/upload-artifact@v4
        with:
          name: backtest-result
          path: data/backtest.json
          retention-days: 30
