name: Minervini Backtest

# Replays the current strict Minervini trend-template screener against a list of
# known winners (Minervini's USIC buys) as of their buy dates, to measure how
# many our screening conditions would have flagged at/near the same time.
#
# Needs outbound Yahoo Finance access (yfinance), which the sandboxed app
# container does not have — hence running it here. Manual trigger only.

on:
  workflow_dispatch:
    inputs:
      since:
        description: 'Only backtest Minervini ideas on/after this date (YYYY-MM-DD). Older tickers are often delisted on Yahoo.'
        type: string
        default: '2017-01-01'
      window_before:
        description: 'Trading days before the buy date to scan'
        type: string
        default: '5'
      window_after:
        description: 'Trading days after the buy date to scan'
        type: string
        default: '15'
      strict_rs:
        description: 'RS floor for the "strict" catch-rate (app preset uses 90)'
        type: string
        default: '90'
      strict_from_high:
        description: 'Max % below the 52w high for "strict", negative (app preset uses -10)'
        type: string
        default: '-10'
      build_bundle:
        description: 'Also build the offline trade-idea OHLCV bundle, run the fixed ground-truth harness, and commit bundle+report to this branch'
        type: boolean
        default: false
      bundle_sleep:
        description: 'Seconds between Yahoo downloads for the bundle job'
        type: string
        default: '0.8'

jobs:
  backtest:
    runs-on: ubuntu-latest
    env:
      # The scanner package imports DB config at import time but the backtest
      # never queries the database; a dummy URL keeps create_engine lazy/offline.
      DATABASE_URL: postgresql://user:pass@localhost:5432/unused
      REDIS_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run Minervini winners backtest
        working-directory: backend
        run: |
          python -m scripts.backtest_minervini_winners \
            --since "${{ github.event.inputs.since }}" \
            --window-before "${{ github.event.inputs.window_before }}" \
            --window-after "${{ github.event.inputs.window_after }}" \
            --strict-rs "${{ github.event.inputs.strict_rs }}" \
            --strict-from-high "${{ github.event.inputs.strict_from_high }}" \
            --markdown "$RUNNER_TEMP/backtest-report.md"

      - name: Publish report to job summary
        if: ${{ always() }}
        run: |
          if [ -f "$RUNNER_TEMP/backtest-report.md" ]; then
            cat "$RUNNER_TEMP/backtest-report.md" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Backtest produced no report (see logs)." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload report artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: minervini-backtest-report
          path: ${{ runner.temp }}/backtest-report.md
          if-no-files-found: ignore

  # Builds the offline OHLCV bundle around all 908 trade ideas, runs the FIXED
  # ground-truth harness (scripts/validate_trade_ideas.py), and commits the
  # ~5MB gzipped bundle + report back to the triggering branch so sandboxed
  # sessions (no Yahoo egress) can replay the full harness offline every cycle.
  bundle:
    if: ${{ github.event.inputs.build_bundle == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write
    env:
      DATABASE_URL: postgresql://user:pass@localhost:5432/unused
      REDIS_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Fetch OHLCV windows for the trade ideas
        working-directory: backend
        run: python -m scripts.fetch_trade_idea_windows --sleep "${{ github.event.inputs.bundle_sleep }}"

      - name: Run the fixed ground-truth harness
        working-directory: backend
        run: |
          python -m scripts.validate_trade_ideas \
            --json calibration/trade_idea_report.json \
            | tee calibration/trade_idea_report.md

      - name: Publish harness report to job summary
        if: ${{ always() }}
        run: |
          if [ -f backend/calibration/trade_idea_report.md ]; then
            cat backend/calibration/trade_idea_report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Harness produced no report (see logs)." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit bundle + report to the branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/calibration/trade_idea_windows \
                  backend/calibration/trade_idea_report.json \
                  backend/calibration/trade_idea_report.md
          if git diff --cached --quiet; then
            echo "Nothing new to commit."
            exit 0
          fi
          git commit -m "data(validation): trade-idea OHLCV bundle + ground-truth report [skip ci]"
          # The session may push to the branch while this job runs; rebase first.
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Upload bundle artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: trade-idea-validation
          path: |
            backend/calibration/trade_idea_report.md
            backend/calibration/trade_idea_report.json
          if-no-files-found: ignore
