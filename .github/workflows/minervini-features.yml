name: Minervini Entry Features

# Measures the common factors (trend location, ADR, momentum, extension, volume)
# across Mark Minervini's ~900 real referenced entries, to surface the
# statistical DNA of his picks for new screening filters. Needs outbound Yahoo
# Finance (available here, not the app sandbox). Manual only.

on:
  workflow_dispatch:
    inputs:
      since_year:
        description: 'Only evaluate setups from this year onward'
        type: string
        default: '2010'
      limit:
        description: 'Max number of setups to evaluate'
        type: string
        default: '600'

jobs:
  features:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://user:pass@localhost:5432/unused
      REDIS_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt
      - name: Analyze Minervini entry features
        working-directory: backend
        run: python -m scripts.analyze_minervini_entries --since-year "${{ github.event.inputs.since_year }}" --limit "${{ github.event.inputs.limit }}" --markdown "$RUNNER_TEMP/feat.md"
      - name: Publish to job summary
        if: ${{ always() }}
        run: '[ -f "$RUNNER_TEMP/feat.md" ] && cat "$RUNNER_TEMP/feat.md" >> "$GITHUB_STEP_SUMMARY" || true'
