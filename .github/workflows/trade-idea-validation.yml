name: Trade-Idea Ground-Truth Validation

# Builds the offline OHLCV bundle around Minervini's 908 published trade ideas
# (scripts/fetch_trade_idea_windows.py — needs Yahoo egress, hence CI) and runs
# the FIXED ground-truth harness (scripts/validate_trade_ideas.py) against it.
#
# It then COMMITS both the bundle (backend/calibration/trade_idea_windows/,
# ~5MB of gzipped per-ticker CSVs) and the report back to the triggering
# branch, so sandboxed sessions can replay the full harness offline on every
# improvement cycle. Manual trigger only.

on:
  workflow_dispatch:
    inputs:
      since_year:
        description: 'Only fetch/validate ideas from this year on (1997 = all; pre-2010 tickers are often delisted on Yahoo)'
        type: string
        default: '1997'
      sleep:
        description: 'Seconds between Yahoo downloads'
        type: string
        default: '0.8'
      commit_bundle:
        description: 'Commit the fetched bundle + report back to this branch'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      DATABASE_URL: postgresql://user:pass@localhost:5432/unused
      REDIS_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Fetch OHLCV windows for the trade ideas
        working-directory: backend
        run: |
          ARGS="--sleep ${{ github.event.inputs.sleep }}"
          if [ "${{ github.event.inputs.since_year }}" != "1997" ]; then
            ARGS="$ARGS --since-year ${{ github.event.inputs.since_year }}"
          fi
          python -m scripts.fetch_trade_idea_windows $ARGS

      - name: Run the fixed ground-truth harness
        working-directory: backend
        run: |
          SINCE=""
          if [ "${{ github.event.inputs.since_year }}" != "1997" ]; then
            SINCE="--since-year ${{ github.event.inputs.since_year }}"
          fi
          python -m scripts.validate_trade_ideas $SINCE \
            --json calibration/trade_idea_report.json \
            | tee calibration/trade_idea_report.md

      - name: Publish report to job summary
        if: ${{ always() }}
        run: |
          if [ -f backend/calibration/trade_idea_report.md ]; then
            cat backend/calibration/trade_idea_report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Harness produced no report (see logs)." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit bundle + report to the branch
        if: ${{ github.event.inputs.commit_bundle == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/calibration/trade_idea_windows \
                  backend/calibration/trade_idea_report.json \
                  backend/calibration/trade_idea_report.md
          if git diff --cached --quiet; then
            echo "Nothing new to commit."
            exit 0
          fi
          git commit -m "data(validation): trade-idea OHLCV bundle + ground-truth report [skip ci]"
          # The session may push to the branch while this job runs; rebase first.
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Upload report artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: trade-idea-validation
          path: |
            backend/calibration/trade_idea_report.md
            backend/calibration/trade_idea_report.json
          if-no-files-found: ignore
