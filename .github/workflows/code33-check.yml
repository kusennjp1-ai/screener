name: Code 33 Check

# Validates the Code 33 (Minervini earnings-acceleration) engine against live
# SEC EDGAR data before it is wired into the universe scan. Needs outbound
# data.sec.gov access (available here, not in the app sandbox). Manual only.

on:
  workflow_dispatch:
    inputs:
      from_trade_ideas:
        description: 'Also check tickers from data/minervini_trade_ideas.csv'
        type: boolean
        default: true
      limit:
        description: 'Max trade-idea tickers to check'
        type: string
        default: '40'
      as_of_idea_dates:
        description: 'Point-in-time catch rate AT idea dates (with 1y-earlier control)'
        type: boolean
        default: false

jobs:
  code33:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://user:pass@localhost:5432/unused
      REDIS_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run Code 33 EDGAR check
        working-directory: backend
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.from_trade_ideas }}" = "true" ]; then
            ARGS="--from-trade-ideas --limit ${{ github.event.inputs.limit }}"
          fi
          if [ "${{ github.event.inputs.as_of_idea_dates }}" = "true" ]; then
            ARGS="$ARGS --as-of-idea-dates --limit ${{ github.event.inputs.limit }}"
          fi
          python -m scripts.check_code33 $ARGS --markdown "$RUNNER_TEMP/code33-report.md"

      - name: Publish report to job summary
        if: ${{ always() }}
        run: |
          if [ -f "$RUNNER_TEMP/code33-report.md" ]; then
            cat "$RUNNER_TEMP/code33-report.md" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload report artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: code33-report
          path: ${{ runner.temp }}/code33-report.md
          if-no-files-found: ignore
