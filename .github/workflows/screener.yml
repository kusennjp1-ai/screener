name: Daily Screener

on:
  schedule:
    # 22:15 UTC 平日 = 米国市場引け後（夏時間16時=20:00UTC / 冬時間=21:00UTC）
    # 日本時間では火〜土の朝7:15に最新データが揃う
    - cron: '15 22 * * 1-5'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance pandas numpy lxml requests

      - name: Fetch previous data as fallback
        run: |
          mkdir -p data
          curl -fsSL "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/data/screener_latest.json" \
            -o data/screener_prev.json || echo "no previous data"

      - name: Run screener
        id: screener
        continue-on-error: true
        run: python screener.py

      - name: Use fallback if screener failed
        run: |
          if [ ! -f data/screener_latest.json ]; then
            if [ -f data/screener_prev.json ]; then
              echo "::warning::Screener failed — keeping previous data"
              cp data/screener_prev.json data/screener_latest.json
            else
              echo "::error::No data available"
              exit 1
            fi
          fi

      - name: Assemble site
        run: |
          mkdir -p _site/data
          cp index.html manifest.json sw.js icon.svg _site/
          cp data/screener_latest.json _site/data/

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
