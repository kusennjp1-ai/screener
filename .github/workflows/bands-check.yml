name: MM360 Band Check

# Computes the Pressure / Buy Risk / TPR bands from live Yahoo data for given
# tickers (default ARM), so the output can be compared to a Minervini Markets
# 360 screenshot. Needs outbound Yahoo Finance (available here, not the app
# sandbox). Manual only.

on:
  workflow_dispatch:
    inputs:
      tickers:
        description: 'Space-separated tickers'
        type: string
        default: 'ARM'

jobs:
  bands:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://user:pass@localhost:5432/unused
      REDIS_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt
      - name: Run band check
        working-directory: backend
        run: python -m scripts.check_bands ${{ github.event.inputs.tickers }} --markdown "$RUNNER_TEMP/bands.md"
      - name: Publish to job summary
        if: ${{ always() }}
        run: '[ -f "$RUNNER_TEMP/bands.md" ] && cat "$RUNNER_TEMP/bands.md" >> "$GITHUB_STEP_SUMMARY" || true'
