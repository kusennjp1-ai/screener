<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RS Screener">
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="manifest.json">
<title>RS Screener v12</title>


<!-- iOS icon fallback -->
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%230f172a'/><text x='90' y='125' font-size='90' text-anchor='middle' fill='%23f59e0b'>🧙</text></svg>">

<style>
:root {
  --bg:        #0f172a;
  --surface:   #1e293b;
  --surface2:  #263248;
  --border:    #334155;
  --accent:    #f59e0b;
  --accent2:   #3b82f6;
  --text:      #f1f5f9;
  --text2:     #94a3b8;
  --green:     #22c55e;
  --red:       #ef4444;
  --orange:    #f97316;
  --gold:      #f59e0b;
  --safe: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'SF Pro Text', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif; overflow: hidden; }

/* ===== LAYOUT ===== */
#app { display: flex; flex-direction: column; height: 100dvh; }

/* Header */
.hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px 8px;
  padding-top: max(12px, env(safe-area-inset-top, 12px));
  background: var(--bg); border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.hdr-title { font-size: 18px; font-weight: 800; color: var(--accent); letter-spacing: -0.5px; }
.hdr-sub   { font-size: 10px; color: var(--text2); margin-top: 1px; }

/* Status pill */
.status-pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 700;
  letter-spacing: 0.3px;
}

/* Tab bar */
.tabs {
  display: flex; background: var(--surface); border-bottom: 1px solid var(--border);
  flex-shrink: 0; overflow-x: auto; scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex: 1; padding: 10px 8px; font-size: 11px; font-weight: 600;
  color: var(--text2); border: none; background: none; cursor: pointer;
  white-space: nowrap; position: relative; transition: color 0.2s;
  min-width: 70px;
}
.tab.active { color: var(--accent); }
.tab.active::after {
  content: ''; position: absolute; bottom: 0; left: 20%; right: 20%;
  height: 2px; background: var(--accent); border-radius: 2px;
}

/* Scroll area */
.scroll { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }

/* Cards */
.card {
  background: var(--surface); border-radius: 12px; margin: 10px 12px;
  border: 1px solid var(--border); overflow: hidden;
}
.card-hdr {
  padding: 10px 14px; font-size: 12px; font-weight: 700;
  color: var(--text2); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}

/* ENV banner */
.env-banner {
  margin: 10px 12px; border-radius: 12px; padding: 14px 16px;
  display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
}
.env-stat { text-align: center; min-width: 60px; }
.env-stat-val { font-size: 17px; font-weight: 800; }
.env-stat-lbl { font-size: 9px; color: rgba(255,255,255,0.7); margin-top: 1px; }

/* Stock row */
.stock-row {
  padding: 10px 14px; display: flex; align-items: center; gap: 8px;
  border-bottom: 1px solid var(--border); cursor: pointer;
  transition: background 0.15s; position: relative;
}
.stock-row:last-child { border-bottom: none; }
.stock-row:active { background: var(--surface2); }
.stock-row.selected { background: rgba(59,130,246,0.12); }

.sym { font-size: 15px; font-weight: 800; color: var(--text); min-width: 50px; }
.sector-sm { font-size: 10px; color: var(--text2); margin-top: 1px; line-height: 1.2; }
.stars { font-size: 13px; color: #f59e0b; min-width: 38px; text-align: right; }

/* Badges */
.badge {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 2px 7px; border-radius: 5px; font-size: 10px; font-weight: 700;
  white-space: nowrap; min-width: 28px;
}
.tag {
  display: inline-flex; align-items: center;
  padding: 1px 5px; border-radius: 3px; font-size: 9px; font-weight: 800;
  white-space: nowrap;
}

/* Grade colors */
.g-ap  { background: #16a34a; color: #fff; }
.g-a   { background: #4ade80; color: #14532d; }
.g-b   { background: #fbbf24; color: #451a03; }
.g-c   { background: #f87171; color: #450a0a; }
.g-n   { background: #334155; color: #94a3b8; }

/* RS color */
.rs-gold { background: #f59e0b; color: #451a03; }
.rs-ok   { background: #4ade80; color: #14532d; }
.rs-dim  { background: #334155; color: #cbd5e1; }

/* Metric row */
.metrics { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }

/* Detail expand */
.detail {
  margin: 0 12px 10px; padding: 12px 14px;
  background: rgba(59,130,246,0.08); border-radius: 0 0 12px 12px;
  border: 1px solid rgba(59,130,246,0.2); border-top: none;
  font-size: 11px; line-height: 1.7; color: var(--text2);
  animation: slideDown 0.2s ease;
}
.detail b { color: var(--accent); }
@keyframes slideDown { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:none; } }

/* Main grid (3-col key metrics) */
.main-metrics {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 1px; background: var(--border);
}
.metric-cell {
  background: var(--surface2); padding: 8px 10px; text-align: center;
}
.metric-val { font-size: 16px; font-weight: 800; color: var(--text); }
.metric-lbl { font-size: 9px; color: var(--text2); margin-top: 1px; }

/* Sector bar */
.sec-row {
  display: flex; align-items: center; gap: 8px; padding: 8px 14px;
  border-bottom: 1px solid var(--border);
}
.sec-row:last-child { border-bottom: none; }
.sec-rank { font-size: 10px; color: var(--text2); min-width: 18px; }
.sec-etf  { font-size: 12px; font-weight: 800; min-width: 38px; }
.sec-name { font-size: 11px; color: var(--text2); flex: 1; }
.sec-bar  { height: 4px; border-radius: 2px; min-width: 4px; }

/* Filter chips */
.chips { display: flex; gap: 6px; padding: 8px 12px; overflow-x: auto; scrollbar-width: none; flex-shrink: 0; }
.chips::-webkit-scrollbar { display: none; }
.chip {
  padding: 5px 12px; border-radius: 16px; font-size: 11px; font-weight: 600;
  white-space: nowrap; cursor: pointer; border: 1px solid var(--border);
  background: var(--surface); color: var(--text2); transition: all 0.15s;
}
.chip.active { background: var(--accent); color: #000; border-color: var(--accent); }

/* Update panel */
.update-panel {
  position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100;
  display: flex; align-items: flex-end; padding-bottom: var(--safe);
}
.update-sheet {
  background: var(--surface); border-radius: 20px 20px 0 0; width: 100%; padding: 20px 16px;
  padding-bottom: calc(20px + var(--safe));
}
.update-sheet h3 { font-size: 16px; font-weight: 800; margin-bottom: 4px; }
.update-sheet p  { font-size: 12px; color: var(--text2); margin-bottom: 12px; line-height: 1.5; }
textarea {
  width: 100%; height: 140px; background: var(--bg); color: var(--text);
  border: 1px solid var(--border); border-radius: 10px; padding: 10px;
  font-size: 12px; font-family: monospace; resize: none;
}
.btn {
  width: 100%; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 800;
  border: none; cursor: pointer; margin-top: 10px; transition: opacity 0.15s;
}
.btn:active { opacity: 0.8; }
.btn-primary { background: var(--accent); color: #000; }
.btn-cancel  { background: var(--surface2); color: var(--text2); }

/* Empty state */
.empty { padding: 40px 20px; text-align: center; color: var(--text2); font-size: 13px; }
.empty-icon { font-size: 36px; margin-bottom: 10px; }

/* Bottom safe area */
.bottom-space { height: max(16px, env(safe-area-inset-bottom, 16px)); }

/* Scrollbar */
.scroll::-webkit-scrollbar { width: 3px; }
.scroll::-webkit-scrollbar-track { background: transparent; }
.scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div>
      <div class="hdr-title">🧙 RS Screener</div>
      <div class="hdr-sub" id="hdr-date">最新データを取得中…</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="status-pill" id="status-pill">—</div>
      <button onclick="openUpdate()" style="background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:6px 10px;border-radius:8px;font-size:12px;cursor:pointer;">更新</button>
    </div>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab active" onclick="showTab('home')"   id="tab-home">🏠 ホーム</button>
    <button class="tab"        onclick="showTab('main')"   id="tab-main">📋 メイン</button>
    <button class="tab"        onclick="showTab('tight')"  id="tab-tight">📊 保ち合い</button>
    <button class="tab"        onclick="showTab('sector')" id="tab-sector">🏭 セクター</button>
  </div>

  <!-- ホーム -->
  <div class="scroll" id="pane-home">
    <div id="env-banner-wrap"></div>
    <div class="card">
      <div class="card-hdr">📋 メイン最有望</div>
      <div id="home-main-list"></div>
    </div>
    <div class="card">
      <div class="card-hdr">📊 高値保ち合い TOP5</div>
      <div id="home-tight-list"></div>
    </div>
    <div class="bottom-space"></div>
  </div>

  <!-- メイン -->
  <div class="scroll" id="pane-main" style="display:none">
    <div class="card" style="margin-top:10px;">
      <div id="main-list"></div>
    </div>
    <div class="bottom-space"></div>
  </div>

  <!-- 高値保ち合い -->
  <div id="pane-tight" style="display:none;display:flex;flex-direction:column;height:100%;overflow:hidden;">
    <div class="chips" id="tight-chips">
      <div class="chip active" onclick="setFilter('all',this)">全件</div>
      <div class="chip" onclick="setFilter('energy',this)">🛢️ エネルギー</div>
      <div class="chip" onclick="setFilter('rl',this)">★ RSライン</div>
      <div class="chip" onclick="setFilter('vcp',this)">🌀 VCP</div>
      <div class="chip" onclick="setFilter('vdu',this)">📉 VDU</div>
      <div class="chip" onclick="setFilter('bkt',this)">🔥 BKT出来高</div>
    </div>
    <div class="scroll" style="flex:1;">
      <div class="card" style="margin-top:0;">
        <div id="tight-list"></div>
      </div>
      <div class="bottom-space"></div>
    </div>
  </div>

  <!-- セクター -->
  <div class="scroll" id="pane-sector" style="display:none">
    <div class="card" style="margin-top:10px;display:none;" id="group-card">
      <div class="card-hdr">業種グループRS順位（IBD流 細分化業種）</div>
      <div id="group-list"></div>
    </div>
    <div class="card" style="margin-top:10px;">
      <div class="card-hdr">セクターRS順位（11セクターETF）</div>
      <div id="sector-list"></div>
    </div>
    <div class="bottom-space"></div>
  </div>
</div>

<!-- 更新パネル -->
<div class="update-panel" id="update-panel" style="display:none">
  <div class="update-sheet">
    <h3>📥 データを更新</h3>
    <p>データは毎営業日、GitHub Actionsで自動更新されます。手動で再取得するか、JSONを直接貼り付けることもできます。</p>
    <button class="btn btn-primary" onclick="manualFetch()">🔄 最新データを取得</button>
    <textarea id="json-input" style="margin-top:12px;" placeholder='手動更新する場合: {"env":{...},"main":[...],"tight":[...],"sectors":[...]} を貼り付け'></textarea>
    <button class="btn btn-primary" onclick="loadJSON()">貼り付けたJSONを読み込む</button>
    <button class="btn btn-cancel" onclick="closeUpdate()" style="margin-top:6px;">キャンセル</button>
  </div>
</div>

<script>
// ===== STATE =====
let DATA = null;
let currentTab = 'home';
let tightFilter = 'all';
let selectedSym = null;

// チャート設定 (足種・形式) — localStorageに保存
let chartCache = {};
let chartPrefs = { tf: 'w', style: 'candle' };
try { Object.assign(chartPrefs, JSON.parse(localStorage.getItem('chart_prefs') || '{}')); } catch(e) {}

// ===== COLORS =====
const statusBg = { 'BUY MODE':'#16a34a','CAUTION':'#f97316','DO NOT BUY':'#dc2626' };
const gradeClass = { 'A+':'g-ap','A':'g-a','B':'g-b','C':'g-c','C-':'g-c','N':'g-n' };
const gradeLabel = { 'A+':'A+','A':'A','B':'B','C':'C','C-':'C-','N':'—' };

function rsClass(rs) {
  if (rs >= 93) return 'rs-gold';
  if (rs >= 70) return 'rs-ok';
  return 'rs-dim';
}
function secRsColor(rs) {
  if (rs >= 85) return '#f59e0b';
  if (rs >= 70) return '#22c55e';
  if (rs < 50)  return '#ef4444';
  return '#475569';
}
function rrColor(rr) {
  if (rr >= 5) return '#f59e0b';
  if (rr >= 3) return '#22c55e';
  return '#475569';
}
function depthColor(d) {
  if (d <= 10) return '#22c55e';
  if (d <= 18) return '#f59e0b';
  return '#475569';
}

// ===== RENDER HELPERS =====
function badge(text, cls, extra='') {
  return `<span class="badge ${cls}" ${extra}>${text}</span>`;
}
function tag(text, color) {
  return `<span class="tag" style="background:${color};color:#fff;">${text}</span>`;
}
function n(v, unit='', dec=1) {
  if (v === null || v === undefined || v !== v) return '—';
  return (typeof v === 'number' ? v.toFixed(dec) : v) + unit;
}

// ===== ENV BANNER =====
function renderEnv() {
  if (!DATA) return;
  const e = DATA.env;
  const col = statusBg[e.status] || '#475569';
  const ma200sign = e.spy_ma200_pct >= 0 ? '+' : '';

  // ENVスコア推移スパークライン（60日）
  let spark = '';
  const hist = DATA.env_history || [];
  if (hist.length >= 2) {
    const w = 120, hgt = 30, nh = hist.length;
    const pts = hist.map((p,i) =>
      `${(i/(nh-1)*w).toFixed(1)},${(hgt-3-(Math.max(0,Math.min(100,p.s))/100)*(hgt-6)).toFixed(1)}`
    ).join(' ');
    const last = hist[hist.length-1];
    const lastY = (hgt-3-(Math.max(0,Math.min(100,last.s))/100)*(hgt-6)).toFixed(1);
    spark = `
      <div style="flex:0 0 auto;">
        <svg width="${w}" height="${hgt}" viewBox="0 0 ${w} ${hgt}" style="display:block;">
          <line x1="0" y1="${hgt-3-0.65*(hgt-6)}" x2="${w}" y2="${hgt-3-0.65*(hgt-6)}" stroke="rgba(255,255,255,0.15)" stroke-dasharray="3,3"/>
          <polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.5" stroke-linejoin="round"/>
          <circle cx="${w}" cy="${lastY}" r="2.5" fill="${col}"/>
        </svg>
        <div class="env-stat-lbl" style="text-align:center;">ENV推移（${nh}日）</div>
      </div>`;
  }

  document.getElementById('env-banner-wrap').innerHTML = `
    <div class="env-banner" style="background:${col}20;border:1px solid ${col}50;">
      <div style="flex:0 0 auto;">
        <div style="font-size:20px;font-weight:900;color:${col};">
          ${e.status === 'BUY MODE' ? '✅' : e.status === 'CAUTION' ? '⚠️' : '🚫'} ${e.status}
        </div>
        ${e.pulse ? `<div style="font-size:11px;font-weight:700;color:${col};margin-top:2px;">${e.pulse}</div>` : ''}
        <div style="font-size:10px;color:var(--text2);margin-top:2px;">${e.date || ''}</div>
      </div>
      <div style="display:flex;gap:16px;flex-wrap:wrap;">
        ${(() => {
          const stats = [
            ['ENV', `${e.env_score}/100`],
            ['SPY', `$${e.spy}`],
            ['vs MA200', `${ma200sign}${e.spy_ma200_pct}%`],
          ];
          if (e.qqq) stats.push(['QQQ', `$${e.qqq}`]);
          else if (e.spy_ma50_pct !== undefined) stats.push(['vs MA50', `${e.spy_ma50_pct>=0?'+':''}${e.spy_ma50_pct}%`]);
          if (e.dist_spy !== undefined && e.dist_qqq !== null && e.dist_qqq !== undefined)
            stats.push(['分配日', `S${e.dist_spy}/Q${e.dist_qqq}`]);
          else if (e.dist_spy !== undefined) stats.push(['分配日', `${e.dist_spy}日`]);
          else if (e.dist_days !== undefined) stats.push(['分配日', `${e.dist_days}日`]);
          stats.push(['Stage2', `${e.stage2_count}銘柄`]);
          if (e.nh !== undefined) stats.push(['NH/NL', `${e.nh}/${e.nl}`]);
          if (e.pct_above_ma200 !== undefined) stats.push(['MA200超', `${e.pct_above_ma200}%`]);
          else stats.push(['RS70+', `${e.rs70_count}/${e.rs70_total}`]);
          return stats;
        })().map(([l,v])=>`
          <div class="env-stat">
            <div class="env-stat-val" style="color:${col};">${v}</div>
            <div class="env-stat-lbl">${l}</div>
          </div>
        `).join('')}
      </div>
      ${spark}
    </div>`;

  const pill = document.getElementById('status-pill');
  pill.textContent = e.status === 'BUY MODE' ? '✅ BUY' : e.status === 'CAUTION' ? '⚠️ CAUTION' : '🚫 NO BUY';
  pill.style.background = col;
  pill.style.color = '#fff';

  document.getElementById('hdr-date').textContent = e.date || '';
}

// ===== STOCK ROW =====
function stockRow(r, mode='main') {
  const gc = gradeClass[r.grade] || 'g-n';
  const gl = gradeLabel[r.grade] || '—';
  const rlTag = r['RSライン52日'] === '★' || r['RSライン52'] === '★'
    ? tag('★52','#d97706') : '';
  const vduTag = r['VDU'] === 'YES' ? tag('VDU','#16a34a') : '';
  const bktTag = (r['BKT出来高'] === '✓' || r['BKT'] === '✓')
    ? tag('BKT','#f59e0b') : '';
  const c33Tag = r['Code33'] === '✓' ? tag('C33','#7c3aed') : '';
  const vcpTag = r['VCP'] === '✓' ? tag('VCP','#0d9488') : '';
  const extTag = r['EXT'] === '✓' ? tag('EXT','#dc2626') : '';
  const ed = r['決算日数'];
  const earnTag = (ed !== null && ed !== undefined && ed >= 0 && ed <= 10)
    ? tag(`E${ed}d`,'#be123c') : '';

  const sym = r['シンボル'] || r['sym'] || '?';
  const sector = r['業種'] || r['セクター'] || r['sector'] || '';
  const secRs = r['セクターRS数値'] || r['セクターRS'] || r['sec_rs'] || 0;
  const rs = r['RS'] || 0;
  const stars = r['★'] || r['stars'] || '';
  const grade = r['ファンダG'] || r['grade'] || 'N';
  const volM = r['出来高$M'] || r['vol_m'];
  const score = r['総合Score'] || r['score'] || 0;

  if (mode === 'main') {
    const pvt  = r['ピボット'] || r['pivot'];
    const stop = r['ストップ'] || r['stop'];
    const rr   = r['RR比'] || r['rr'];
    const risk = r['リスク%'] || r['risk'];
    const depth= r['深さ%'] || r['depth'];
    const bc   = r['ベース回数'] || r['bc'];
    const hi52 = r['高値比%'] || r['hi52'];

    return `
      <div class="stock-row ${selectedSym===sym?'selected':''}" onclick="toggleSym('${sym}','main')">
        <div style="flex:0 0 auto;">
          <div class="sym">${sym}</div>
          <div class="sector-sm">${sector}</div>
        </div>
        <div style="flex:1;display:flex;flex-direction:column;gap:3px;min-width:0;">
          <div style="display:flex;gap:4px;flex-wrap:wrap;align-items:center;">
            ${badge(gl, gc)}
            ${badge(`RS${rs}`, rsClass(rs))}
            ${badge(`SecRS${secRs}`, secRs >= 70 ? 'rs-ok' : secRs < 50 ? 'g-c' : 'g-n')}
            ${extTag}${earnTag}${vcpTag}${rlTag}${vduTag}${bktTag}${c33Tag}
          </div>
          <div style="display:flex;gap:10px;font-size:11px;color:var(--text2);">
            <span>Pvt <b style="color:var(--text)">$${n(pvt,'',2)}</b></span>
            <span>Stop <b style="color:#ef4444">$${n(stop,'',2)}</b></span>
            <span style="color:${rrColor(rr)}">RR <b>${n(rr,'x')}</b></span>
          </div>
        </div>
        <div style="flex:0 0 auto;text-align:right;">
          <div class="stars">${stars}</div>
          <div style="font-size:11px;color:var(--text2);margin-top:2px;">${n(score,'',0)}pt</div>
        </div>
      </div>`;
  } else {
    const range = r['値幅%'] || r['range_pct'];
    const hi52  = r['高値比%'] || r['hi52'];
    const type  = r['リスト種別'] || r['type'] || '';
    const typeTag = type === '救済枠' ? tag('救済','#6366f1') : '';

    return `
      <div class="stock-row ${selectedSym===sym?'selected':''}" onclick="toggleSym('${sym}','tight')">
        <div style="flex:0 0 auto;">
          <div class="sym">${sym}</div>
          <div class="sector-sm">${sector}</div>
        </div>
        <div style="flex:1;display:flex;flex-direction:column;gap:3px;min-width:0;">
          <div style="display:flex;gap:4px;flex-wrap:wrap;align-items:center;">
            ${badge(gl, gc)}
            ${badge(`RS${rs}`, rsClass(rs))}

            ${extTag}${earnTag}${vcpTag}${rlTag}${vduTag}${bktTag}${typeTag}
          </div>
          <div style="font-size:11px;color:var(--text2);">
            <span>SecRS <b style="color:${secRsColor(secRs)}">${secRs}</b></span>
            <span style="margin-left:10px;">高値比 <b style="color:var(--text)">${n(hi52,'%')}</b></span>
            <span style="margin-left:10px;">$<b style="color:var(--text)">${n(volM,'M')}</b></span>
          </div>
        </div>
        <div style="flex:0 0 auto;text-align:right;">
          <div class="stars">${stars}</div>
          <div style="font-size:11px;color:var(--text2);margin-top:2px;">${n(score,'',0)}pt</div>
        </div>
      </div>`;
  }
}

// ===== DETAIL PANEL =====
function detailPanel(sym, mode) {
  const rows = mode === 'main' ? DATA.main : DATA.tight;
  const r = rows.find(x => (x['シンボル']||x['sym']) === sym);
  if (!r) return '';

  const reason = r['有望理由'] || r['reason'] || '';
  const eps    = r['EPS成長%'];
  const rev    = r['売上成長%'];
  const nxt    = r['次回決算'] || r['next_earnings'] || '';
  const c33    = r['Code33'] === '✓';

  let extras = [];
  if (eps !== null && eps !== undefined && eps === eps) extras.push(`EPS成長: <b>${n(eps,'%')}</b>`);
  if (rev !== null && rev !== undefined && rev === rev) extras.push(`売上成長: <b>${n(rev,'%')}</b>`);
  if (c33) extras.push(`<b style="color:#7c3aed">✦ Code 33 達成</b>`);
  if (r['業種順位']) extras.push(`業種順位: <b>#${r['業種順位']}/${r['業種総数']}</b>`);
  if (r['ADR%'] !== undefined && r['ADR%'] !== null) extras.push(`ADR: <b>${n(r['ADR%'],'%')}</b>`);
  if (r['収縮回数']) extras.push(`収縮: <b>${r['収縮回数']}回</b>`);
  if (nxt && nxt !== 'None' && nxt.length > 4) extras.push(`次回決算: <b>${nxt}</b>`);

  const reasonHtml = reason.replace(/\n/g,'<br>').replace('【好材料】','<b style="color:#22c55e">【好材料】</b>').replace('【注意】','<b style="color:#f87171">【注意】</b>');

  // レーティングストリップ（Comp / EPS / RS / SMR / A/D / U/D）
  let strip = '';
  if (r['Comp'] !== undefined) {
    const cell = (lbl, val, hot) => `
      <div style="flex:1;text-align:center;padding:5px 1px;background:var(--surface2);border-radius:6px;${hot?'border:1px solid var(--accent);':''}">
        <div style="font-size:13px;font-weight:800;color:${hot?'var(--accent)':'var(--text)'};">${val ?? '—'}</div>
        <div style="font-size:8px;color:var(--text2);">${lbl}</div>
      </div>`;
    strip = `<div style="display:flex;gap:4px;margin-bottom:8px;">
      ${cell('Comp', r['Comp'], r['Comp'] >= 90)}
      ${cell('EPS', r['EPSレート'], r['EPSレート'] >= 80)}
      ${cell('RS', r['RS'], r['RS'] >= 90)}
      ${cell('SMR', r['SMR'] || 'N', 'AB'.includes(r['SMR']))}
      ${cell('A/D', r['AccDis'], 'AB'.includes(r['AccDis']))}
      ${cell('U/D', n(r['UD比'],'',1), r['UD比'] >= 1.5)}
    </div>`;
  }

  // ベース情報（フラットベース / カップ / カップウィズハンドル + 段階）
  const baseLine = r['ベース']
    ? `<div style="margin-bottom:6px;">ベース: <b style="color:var(--accent2)">${r['ベース']}</b>
        （${r['ベース週数']}週・深さ${n(r['ベース深さ%'],'%')}・<b ${r['ベース段階']>=4?'style="color:#ef4444"':''}>第${r['ベース段階']}ステージ</b>）</div>`
    : (r['ベース段階'] !== undefined ? `<div style="margin-bottom:6px;">ベース: 形成中ではない（第${r['ベース段階']}ステージ圏）</div>` : '');

  // ミニチャート（終値 + MA50 + 出来高バー + ピボット/ストップ線）
  let chart = '';
  const px = r['px'];
  if (Array.isArray(px) && px.length >= 10) {
    const pvt = mode === 'main' ? r['ピボット'] : null;
    const stp = mode === 'main' ? r['ストップ'] : null;
    const ma = Array.isArray(r['ma50px']) && r['ma50px'].length === px.length ? r['ma50px'] : null;
    const maVals = ma ? ma.filter(v => v !== null && v !== undefined) : [];
    let lo = Math.min(...px), hi = Math.max(...px);
    if (maVals.length) { lo = Math.min(lo, ...maVals); hi = Math.max(hi, ...maVals); }
    if (pvt) hi = Math.max(hi, pvt);
    if (stp) lo = Math.min(lo, stp);
    const pad = (hi - lo) * 0.05 || 1; lo -= pad; hi += pad;
    const W = 280, H = 76;
    const X = i => (i / (px.length - 1) * W).toFixed(1);
    const Y = v => ((1 - (v - lo) / (hi - lo)) * (H * 0.78)).toFixed(1);
    const pts = px.map((v, i) => `${X(i)},${Y(v)}`).join(' ');
    const maPts = maVals.length >= 2
      ? ma.map((v, i) => v == null ? null : `${X(i)},${Y(v)}`).filter(Boolean).join(' ') : '';
    // 出来高バー（下部22%）
    let volBars = '';
    const vols = r['vols'];
    if (Array.isArray(vols) && vols.length === px.length) {
      const vmax = Math.max(...vols) || 1;
      const bw = W / vols.length;
      volBars = vols.map((v, i) => {
        const bh = Math.max(0.5, (v / vmax) * (H * 0.20));
        return `<rect x="${(i*bw).toFixed(1)}" y="${(H-bh).toFixed(1)}" width="${Math.max(bw-0.4,0.5).toFixed(1)}" height="${bh.toFixed(1)}" fill="rgba(148,163,184,0.4)"/>`;
      }).join('');
    }
    const hline = (v, color, label) => v ? `
      <line x1="0" x2="${W}" y1="${Y(v)}" y2="${Y(v)}" stroke="${color}" stroke-width="1" stroke-dasharray="4,3"/>
      <text x="${W-2}" y="${Math.max(8, Y(v) - 2)}" font-size="7" fill="${color}" text-anchor="end">${label} $${v}</text>` : '';
    chart = `
      <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:76px;display:block;margin-bottom:8px;background:rgba(0,0,0,0.2);border-radius:6px;">
        ${volBars}
        ${maPts ? `<polyline points="${maPts}" fill="none" stroke="#f97316" stroke-width="1" stroke-linejoin="round" opacity="0.9"/>` : ''}
        <polyline points="${pts}" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-linejoin="round"/>
        ${hline(pvt, '#f59e0b', 'Pvt')}${hline(stp, '#ef4444', 'Stop')}
      </svg>`;
  }

  // 買いゾーン（Minervini: ピボット〜+5%。それ以上はEXT＝追いかけない）
  const buyZone = (mode === 'main' && r['ピボット'])
    ? `<div style="margin-bottom:6px;">買いゾーン: <b>$${n(r['ピボット'],'',2)} 〜 $${n(r['ピボット']*1.05,'',2)}</b>${r['EXT']==='✓' ? ' <b style="color:#ef4444">— 現在EXT（上放れ中・押し待ち）</b>' : '（+5%超は追いかけない）'}</div>`
    : '';

  const linkStyle = 'flex:1;text-align:center;padding:8px;border-radius:8px;background:var(--surface2);color:var(--accent2);font-size:12px;font-weight:700;text-decoration:none;border:1px solid var(--border);';
  const links = `
    <div style="display:flex;gap:8px;margin-top:10px;">
      <a href="https://www.tradingview.com/chart/?symbol=${encodeURIComponent(sym)}" target="_blank" rel="noopener" style="${linkStyle}">📈 TradingView</a>
      <a href="https://finance.yahoo.com/quote/${encodeURIComponent(sym)}" target="_blank" rel="noopener" style="${linkStyle}">📊 Yahoo Finance</a>
    </div>`;

  return `
    <div class="detail">
      ${strip}
      <div id="bc-${sym}">${chart}</div>
      ${baseLine}
      ${buyZone}
      ${extras.length ? `<div style="display:flex;gap:14px;flex-wrap:wrap;margin-bottom:8px;">${extras.map(e=>`<span>${e}</span>`).join('')}</div>` : ''}
      ${reasonHtml || '<span style="color:var(--text2)">有望理由なし</span>'}
      ${links}
    </div>`;
}

// ===== BIG CHART =====
function setChartPref(k, v, sym) {
  chartPrefs[k] = v;
  try { localStorage.setItem('chart_prefs', JSON.stringify(chartPrefs)); } catch(e) {}
  renderBigChart(sym);
}

function loadChart(sym) {
  if (chartCache[sym]) { renderBigChart(sym); return; }
  fetch(`data/charts/${encodeURIComponent(sym)}.json?v=${Date.now()}`, { cache: 'no-store' })
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(j => { chartCache[sym] = j; renderBigChart(sym); })
    .catch(() => {});  // 取得失敗時はフォールバックのスパークラインを維持
}

function renderBigChart(sym) {
  const box = document.getElementById('bc-' + sym);
  const cj = chartCache[sym];
  if (!box || !cj) return;
  const tf = chartPrefs.tf === 'd' ? 'd' : 'w';
  const style = chartPrefs.style === 'bar' ? 'bar' : 'candle';
  const sub = cj[tf];
  if (!sub || !Array.isArray(sub.c) || sub.c.length < 2) return;
  const n_ = sub.c.length;

  // レイアウト: 価格62% / 出来高16% / RSライン12%
  const W = 320, H = 170;
  const priceH = H * 0.60, volTop = H * 0.64, volH = H * 0.15, rsTop = H * 0.84, rsH = H * 0.13;

  let lo = Math.min(...sub.l), hi = Math.max(...sub.h);
  const maVals = (sub.ma || []).filter(v => v != null);
  if (maVals.length) { lo = Math.min(lo, ...maVals); hi = Math.max(hi, ...maVals); }
  const pvt = cj.pivot || null, stp = cj.stop || null;
  if (pvt) hi = Math.max(hi, pvt);
  if (stp) lo = Math.min(lo, stp);
  const pad = (hi - lo) * 0.04 || 1; lo -= pad; hi += pad;

  const bw = W / n_;
  const half = Math.max(0.6, bw * 0.32);
  const X = i => (i * bw + bw / 2);
  const Y = v => ((1 - (v - lo) / (hi - lo)) * priceH);
  const f = x => Number(x).toFixed(1);

  let bars = '';
  for (let i = 0; i < n_; i++) {
    const up = sub.c[i] >= sub.o[i];
    const col = up ? '#22c55e' : '#ef4444';
    const x = X(i);
    if (style === 'bar') {
      // IBD風HLCバー: 高安の縦線 + 始値の左ティック + 終値の右ティック
      bars += `<line x1="${f(x)}" y1="${f(Y(sub.h[i]))}" x2="${f(x)}" y2="${f(Y(sub.l[i]))}" stroke="${col}" stroke-width="1"/>`
            + `<line x1="${f(x-half)}" y1="${f(Y(sub.o[i]))}" x2="${f(x)}" y2="${f(Y(sub.o[i]))}" stroke="${col}" stroke-width="1"/>`
            + `<line x1="${f(x)}" y1="${f(Y(sub.c[i]))}" x2="${f(x+half)}" y2="${f(Y(sub.c[i]))}" stroke="${col}" stroke-width="1"/>`;
    } else {
      const top = Y(Math.max(sub.o[i], sub.c[i])), bot = Y(Math.min(sub.o[i], sub.c[i]));
      bars += `<line x1="${f(x)}" y1="${f(Y(sub.h[i]))}" x2="${f(x)}" y2="${f(Y(sub.l[i]))}" stroke="${col}" stroke-width="0.8"/>`
            + `<rect x="${f(x-half)}" y="${f(top)}" width="${f(half*2)}" height="${f(Math.max(0.8, bot-top))}" fill="${col}"/>`;
    }
  }

  // MA線 (日足=MA50 / 週足=MA10週)
  let maLine = '';
  if (maVals.length >= 2) {
    const pts = sub.ma.map((v, i) => v == null ? null : `${f(X(i))},${f(Y(v))}`).filter(Boolean).join(' ');
    maLine = `<polyline points="${pts}" fill="none" stroke="#f97316" stroke-width="1.1" opacity="0.9"/>`;
  }

  // 出来高バー (色は陽線/陰線連動)
  let volBars = '';
  const vmax = Math.max(...sub.v) || 1;
  for (let i = 0; i < n_; i++) {
    const bh = Math.max(0.5, (sub.v[i] / vmax) * volH);
    const col = sub.c[i] >= sub.o[i] ? 'rgba(34,197,94,0.55)' : 'rgba(239,68,68,0.55)';
    volBars += `<rect x="${f(X(i)-half)}" y="${f(volTop + volH - bh)}" width="${f(half*2)}" height="${f(bh)}" fill="${col}"/>`;
  }

  // RSライン (対SPY相対線 — 日足のみ。上向き=市場より強い)
  let rsLine = '';
  if (tf === 'd' && Array.isArray(cj.rs) && cj.rs.length === n_) {
    const rv = cj.rs.filter(v => v != null);
    if (rv.length >= 2) {
      const rlo = Math.min(...rv), rhi = Math.max(...rv);
      const RY = v => rsTop + (1 - (v - rlo) / ((rhi - rlo) || 1)) * rsH;
      const pts = cj.rs.map((v, i) => v == null ? null : `${f(X(i))},${f(RY(v))}`).filter(Boolean).join(' ');
      rsLine = `<polyline points="${pts}" fill="none" stroke="#3b82f6" stroke-width="1"/>`
             + `<text x="2" y="${f(rsTop + 7)}" font-size="7" fill="#3b82f6">RSライン</text>`;
    }
  }

  const hline = (v, color, label) => v ? `
    <line x1="0" x2="${W}" y1="${f(Y(v))}" y2="${f(Y(v))}" stroke="${color}" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="${W-2}" y="${f(Math.max(8, Y(v) - 2))}" font-size="7" fill="${color}" text-anchor="end">${label} $${v}</text>` : '';

  const axis = `
    <text x="2" y="9" font-size="8" fill="var(--text2)">$${hi.toFixed(hi >= 100 ? 0 : 2)}</text>
    <text x="2" y="${f(priceH - 2)}" font-size="8" fill="var(--text2)">$${lo.toFixed(lo >= 100 ? 0 : 2)}</text>
    <text x="2" y="${f(H - 2)}" font-size="7" fill="var(--text2)">${sub.t[0] || ''}</text>
    <text x="${W-2}" y="${f(H - 2)}" font-size="7" fill="var(--text2)" text-anchor="end">${sub.t[n_-1] || ''}</text>`;

  const btn = (label, active, on) =>
    `<button onclick="${on}" style="flex:1;padding:6px 4px;border-radius:6px;border:1px solid ${active?'var(--accent)':'var(--border)'};background:${active?'rgba(245,158,11,0.15)':'var(--surface2)'};color:${active?'var(--accent)':'var(--text2)'};font-size:11px;font-weight:700;cursor:pointer;">${label}</button>`;
  const controls = `
    <div style="display:flex;gap:5px;margin-bottom:6px;">
      ${btn('日足', tf === 'd', `setChartPref('tf','d','${sym}')`)}
      ${btn('週足', tf === 'w', `setChartPref('tf','w','${sym}')`)}
      <div style="width:6px;"></div>
      ${btn('ローソク', style === 'candle', `setChartPref('style','candle','${sym}')`)}
      ${btn('バー', style === 'bar', `setChartPref('style','bar','${sym}')`)}
    </div>`;

  box.innerHTML = controls + `
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block;margin-bottom:6px;background:rgba(0,0,0,0.25);border-radius:8px;">
      ${volBars}${bars}${maLine}${rsLine}
      ${hline(pvt, '#f59e0b', 'Pvt')}${hline(stp, '#ef4444', 'Stop')}
      ${axis}
    </svg>
    <div style="font-size:9px;color:var(--text2);margin-bottom:6px;">
      ${tf === 'w' ? '週足52週・橙=MA10週' : '日足90日・橙=MA50・青=RSライン'}｜緑=陽線/赤=陰線
    </div>`;
}

// ===== TOGGLE =====
function toggleSym(sym, mode) {
  selectedSym = selectedSym === sym ? null : sym;
  if (mode === 'main')  renderMain();
  if (mode === 'tight') renderTight();
  if (mode === 'home') { renderHomeMain(); renderHomeTight(); }
  if (selectedSym) loadChart(selectedSym);
}

// ===== RENDER LISTS =====
function renderMain() {
  if (!DATA || !DATA.main) return;
  const el = document.getElementById('main-list');
  el.innerHTML = DATA.main.map(r => {
    const sym = r['シンボル']||r['sym'];
    const rows = stockRow(r,'main');
    const det  = selectedSym === sym ? detailPanel(sym,'main') : '';
    return rows + det;
  }).join('');
}

function renderTight() {
  if (!DATA || !DATA.tight) return;
  let rows = DATA.tight;
  if (tightFilter === 'energy') rows = rows.filter(r => (r['セクター']||'').includes('エネルギー'));
  if (tightFilter === 'rl')     rows = rows.filter(r => r['RSライン52日']==='★'||r['RSライン52']==='★');
  if (tightFilter === 'vcp')    rows = rows.filter(r => r['VCP']==='✓');
  if (tightFilter === 'vdu')    rows = rows.filter(r => r['VDU']==='YES');
  if (tightFilter === 'bkt')    rows = rows.filter(r => r['BKT出来高']==='✓'||r['BKT']==='✓');

  const el = document.getElementById('tight-list');
  if (rows.length === 0) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div>該当なし</div>';
    return;
  }
  el.innerHTML = rows.map(r => {
    const sym = r['シンボル']||r['sym'];
    const row = stockRow(r,'tight');
    const det = selectedSym === sym ? detailPanel(sym,'tight') : '';
    return row + det;
  }).join('');
}

function renderHomeMain() {
  if (!DATA || !DATA.main) return;
  const top = DATA.main.slice(0,3);
  document.getElementById('home-main-list').innerHTML =
    top.map(r => {
      const sym = r['シンボル']||r['sym'];
      const row = stockRow(r,'main');
      const det = selectedSym === sym ? detailPanel(sym,'main') : '';
      return row + det;
    }).join('') || '<div class="empty"><div class="empty-icon">📭</div>候補なし</div>';
}

function renderHomeTight() {
  if (!DATA || !DATA.tight) return;
  const top = DATA.tight.slice(0,5);
  document.getElementById('home-tight-list').innerHTML =
    top.map(r => {
      const sym = r['シンボル']||r['sym'];
      const row = stockRow(r,'tight');
      const det = selectedSym === sym ? detailPanel(sym,'tight') : '';
      return row + det;
    }).join('') || '<div class="empty"><div class="empty-icon">📭</div>候補なし</div>';
}

function renderSectors() {
  if (!DATA) return;
  // IBD流 業種グループ (細分化145業種) — 旧データでは非表示
  const groups = DATA.groups || [];
  const gcard = document.getElementById('group-card');
  if (gcard) gcard.style.display = groups.length ? 'block' : 'none';
  if (groups.length) {
    document.getElementById('group-list').innerHTML = groups.map(g => {
      const col = secRsColor(g.rs);
      return `
        <div class="sec-row">
          <div class="sec-rank" style="min-width:30px;">#${g.rank}</div>
          <div class="sec-name" style="color:var(--text);font-weight:600;">${g.name}</div>
          <div style="font-size:9px;color:var(--text2);min-width:44px;text-align:right;">${g.count}銘柄 ${g.top||''}</div>
          <span class="badge" style="background:${col}20;color:${col};border:1px solid ${col}50;font-size:11px;font-weight:800;min-width:42px;">
            RS${g.rs}
          </span>
        </div>`;
    }).join('');
  }
  if (!DATA.sectors) return;
  const el = document.getElementById('sector-list');
  el.innerHTML = DATA.sectors.map(s => {
    const rs = s.rs || s['RS'] || 0;
    const col = secRsColor(rs);
    const barW = Math.max(4, rs);
    return `
      <div class="sec-row">
        <div class="sec-rank">#${s.rank||s['順位']}</div>
        <div class="sec-etf">${s.etf||s['ETF']}</div>
        <div class="sec-name">${s.sector||s['セクター']}</div>
        <div style="display:flex;align-items:center;gap:6px;">
          <div class="sec-bar" style="width:${barW}px;background:${col};"></div>
          <span class="badge" style="background:${col}20;color:${col};border:1px solid ${col}50;font-size:11px;font-weight:800;">
            RS${rs}
          </span>
        </div>
      </div>`;
  }).join('');
}

// ===== TABS =====
function showTab(tab) {
  currentTab = tab;
  selectedSym = null;
  ['home','main','tight','sector'].forEach(t => {
    const p = document.getElementById('pane-'+t);
    if (p) p.style.display = t === tab ? (t === 'tight' ? 'flex' : 'block') : 'none';
    document.getElementById('tab-'+t).classList.toggle('active', t === tab);
  });
  if (tab === 'tight')  { renderTight(); document.getElementById('pane-tight').style.flexDirection = 'column'; }
  if (tab === 'main')   renderMain();
  if (tab === 'sector') renderSectors();
  if (tab === 'home')   { renderHomeMain(); renderHomeTight(); }
}

// ===== FILTER =====
function setFilter(f, el) {
  tightFilter = f;
  selectedSym = null;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderTight();
}

// ===== UPDATE =====
function openUpdate()  { document.getElementById('update-panel').style.display='flex'; }
function closeUpdate() { document.getElementById('update-panel').style.display='none'; }

function loadJSON() {
  const txt = document.getElementById('json-input').value.trim();
  if (!txt) { alert('JSONを貼り付けてください'); return; }
  try {
    const d = JSON.parse(txt);
    if (!d.env || !d.main) { alert('形式が正しくありません。\nenv と main が必要です。'); return; }
    DATA = d;
    localStorage.setItem('screener_data', txt);
    localStorage.setItem('screener_ts', new Date().toISOString());
    closeUpdate();
    document.getElementById('json-input').value = '';
    renderAll();
    alert('✅ データを更新しました！');
  } catch(e) {
    alert('JSONの解析に失敗しました。\n' + e.message);
  }
}

function renderAll() {
  renderEnv();
  renderHomeMain();
  renderHomeTight();
  if (currentTab === 'main')   renderMain();
  if (currentTab === 'tight')  renderTight();
  if (currentTab === 'sector') renderSectors();
}

// ===== AUTO FETCH =====
async function fetchLatest(showAlert) {
  try {
    const res = await fetch('data/screener_latest.json?v=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const d = await res.json();
    if (!d.env || !d.main) throw new Error('invalid format');
    DATA = d;
    localStorage.setItem('screener_data', JSON.stringify(d));
    localStorage.setItem('screener_ts', new Date().toISOString());
    renderAll();
    if (showAlert) alert('✅ 最新データを取得しました');
    return true;
  } catch(e) {
    if (showAlert) alert('取得に失敗しました。\n' + e.message);
    if (!DATA) document.getElementById('hdr-date').textContent = 'データなし — 右上の更新ボタンをタップ';
    return false;
  }
}
function manualFetch() {
  closeUpdate();
  fetchLatest(true);
}

// ===== INIT =====
function init() {
  // localStorageからデータを復元（オフライン時のフォールバック）
  const saved = localStorage.getItem('screener_data');
  if (saved) {
    try {
      DATA = JSON.parse(saved);
      renderAll();
    } catch(e) {
      localStorage.removeItem('screener_data');
    }
  }
  // GitHub Pages上の最新JSONを自動取得
  fetchLatest(false);
  // タブ復帰時にも再取得（朝イチで開いたとき用）
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') fetchLatest(false);
  });
  // pane-tight の flex 設定
  document.getElementById('pane-tight').style.cssText = 'display:none;flex-direction:column;height:100%;overflow:hidden;';
  // PWA: Service Worker登録
  if ('serviceWorker' in navigator && location.protocol === 'https:') {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  }
}

init();

</script>
